services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: bundle exec sidekiq
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  pg_data:
